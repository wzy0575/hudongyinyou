# nginx 配置：www.wzy-gameplayer.xin
# 安装路径示例：/etc/nginx/sites-available/wzy-gameplayer.conf
# 启用：sudo ln -s /etc/nginx/sites-available/wzy-gameplayer.conf /etc/nginx/sites-enabled/
# 测试：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name wzy-gameplayer.xin www.wzy-gameplayer.xin;

    # 网站根目录：上传整个「邪气凛然互动影游」文件夹到此路径
    root /var/www/xieqi-game;
    index index.html;

    # 互动视频需要较大请求体（如有上传需求）
    client_max_body_size 100m;

    # 主页面
    location / {
        try_files $uri $uri/ /index.html;
    }

    # branchie 配置文件
    location ~* \.xml$ {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Access-Control-Allow-Origin "*";
    }

    # 视频流式传输（约 1GB 素材，必须开启）
    location ~* \.(mp4|webm|MP4|MP3|mp3)$ {
        add_header Accept-Ranges bytes;
        add_header Access-Control-Allow-Origin "*";
        # 允许跨域 Range 请求（移动端浏览器需要）
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            return 204;
        }
    }

    # 静态资源缓存
    location ~* \.(js|css|jpg|jpeg|png|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问无关文件
    location ~ /\. { deny all; }
    location ~ \.(md|MD)$ { deny all; }

    # 日志
    access_log /var/log/nginx/wzy-gameplayer.access.log;
    error_log  /var/log/nginx/wzy-gameplayer.error.log;
}

